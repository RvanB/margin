<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Margins</title>
  <link rel="stylesheet" href="margins.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Margins</h1>
    <div id="mode-tabs">
      <button class="mode-tab active" data-mode="layout">Layout</button>
      <button class="mode-tab" data-mode="content">Content</button>
    </div>
  </div>

  <div id="toolbar"><!-- populated by JS --></div>
</div>

<div id="canvas-wrap">
  <div id="canvas-area">
    <div id="canvas-area-inner">
      <div id="canvas-stage">
        <canvas id="spread-canvas"></canvas>
        <canvas id="overlay-canvas"></canvas>
      </div>
    </div>
  </div>
  <div id="canvas-controls">
    <div id="canvas-zoom-controls" aria-label="Canvas zoom">
      <button id="canvas-zoom-in" type="button" aria-label="Zoom in">+</button>
      <button id="canvas-zoom-out" type="button" aria-label="Zoom out">-</button>
    </div>
  </div>
  <div id="page-strip"></div>
</div>

<!-- ── Toolbar templates ───────────────────────────────────────────────────── -->

<template id="tpl-layout">

  <div class="section">
    <div class="section-label">Page preset</div>
    <select id="preset">
      <option value="">— custom —</option>
      <option value="8.5,11">US Letter (8.5 × 11)</option>
      <option value="5.5,8.5" selected>Half Letter (5.5 × 8.5)</option>
      <option value="6,9">Trade Paperback (6 × 9)</option>
      <option value="5.25,8">Digest (5.25 × 8)</option>
      <option value="4.19,6.75">Mass Market PB (4.19 × 6.75)</option>
      <option value="8.27,11.69">A4 (8.27 × 11.69)</option>
      <option value="5.83,8.27">A5 (5.83 × 8.27)</option>
      <option value="4.13,5.83">A6 (4.13 × 5.83)</option>
      <option value="6.93,9.84">B5 (6.93 × 9.84)</option>
    </select>
  </div>

  <div class="section">
    <div class="section-label">Page (inches)</div>
    <div class="dim-row">
      <label>width</label>
      <input type="number" id="pw" step="0.01" min="1" max="20" value="5.5">
      <span class="unit">in</span>
    </div>
    <div class="dim-row">
      <label>height</label>
      <input type="number" id="ph" step="0.01" min="1" max="30" value="8.5">
      <span class="unit">in</span>
    </div>
    <div class="dim-row" style="margin-top:4px">
      <label>ratio</label>
      <input type="number" id="page-ratio" step="0.001" min="0.1" max="2" value="0.647">
    </div>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:4px">
      <input type="checkbox" id="preserve-ratio">
      <span style="font-size:11px">Preserve ratio</span>
    </label>
  </div>

  <div class="section">
    <div class="section-label">Text block ratio (w/h)</div>
    <div class="dim-row">
      <input type="number" id="ratio" step="0.001" min="0.1" max="2" value="0.543">
    </div>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:4px">
      <input type="checkbox" id="ratio-same-as-page">
      <span style="font-size:11px">Same as page</span>
    </label>
  </div>

  <div class="section">
    <div class="section-label">Back margin</div>
    <div id="slider-header">
      <span>b</span>
      <span id="b-val">0.75 in</span>
    </div>
    <input type="range" id="b-slider" min="0.1" max="1.5" step="0.01" value="0.75">
    <div class="slider-ends"><span>0.1</span><span>1.5</span></div>
  </div>

  <div class="section">
    <div class="section-label">Proportions (× b)</div>
    <div class="dim-row">
      <label>inner</label>
      <input type="number" id="m-inner" step="0.05" min="0.1" value="1">
    </div>
    <div class="dim-row">
      <label>top</label>
      <input type="number" id="m-top" step="0.05" min="0.1" value="1.5">
    </div>
    <div class="dim-row">
      <label>bottom</label>
      <input type="number" id="m-bottom" step="0.05" min="0.1" value="2.5">
    </div>
  </div>

  <div class="section">
    <div class="section-label">Display</div>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
      <input type="checkbox" id="show-layout-content" checked>
      <span style="font-size:11px">Show content (C)</span>
    </label>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:8px">
      <input type="checkbox" id="show-margin-arrows" checked>
      <span style="font-size:11px">Show margin arrows (M)</span>
    </label>
    <div class="dim-row" style="margin-top:10px;margin-bottom:0;align-items:center">
      <label>paper</label>
      <input type="color" id="paper-color" value="#ffffff">
    </div>
    <div class="dim-row" style="margin-top:6px;margin-bottom:0">
      <label>blend</label>
      <select id="content-blend">
        <option value="source-over">normal</option>
        <option value="multiply">multiply</option>
        <option value="screen">screen</option>
        <option value="overlay">overlay</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="vdg">
        <span style="font-size:11px">van de Graaf (V)</span>
      </label>
      <button id="vdg-snap" style="font-family:inherit;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;background:none;border:1px solid #000;padding:2px 6px;cursor:pointer">Apply</button>
    </div>
  </div>

  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="section-label" style="margin:0">Computed</div>
      <button id="print-btn" style="font-family:inherit;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;background:none;border:none;cursor:pointer;padding:0">Print</button>
    </div>
    <div class="computed-row"><span>inner</span><span id="c-inner">—</span></div>
    <div class="computed-row"><span>top</span><span id="c-top">—</span></div>
    <div class="computed-row"><span>outer</span><span id="c-outer">—</span></div>
    <div class="computed-row"><span>bottom</span><span id="c-bottom">—</span></div>
    <div class="computed-row"><span>tb width</span><span id="c-tw">—</span></div>
    <div class="computed-row"><span>tb height</span><span id="c-th">—</span></div>
  </div>

</template>

<template id="tpl-content">

  <div class="section" id="trim-section" style="display:none">
    <div id="measure-header">
      <span class="section-label" style="margin:0">Measure</span>
      <span id="measure-status">reference</span>
    </div>
    <div id="measure-row">
      <input type="color" id="measure-color" value="#ffffff">
      <div id="measure-summary">
        <div id="measure-hex">#ffffff</div>
        <div id="measure-rgb">rgb 255, 255, 255</div>
      </div>
    </div>
    <div class="measure-grid">
      <div class="computed-row"><span>hue</span><span id="measure-hue">0°</span></div>
      <div class="computed-row"><span>sat</span><span id="measure-sat">0%</span></div>
      <div class="computed-row"><span>value</span><span id="measure-value">100%</span></div>
    </div>
    <label class="content-toggle">
      <input type="checkbox" id="cover-check">
      <span style="font-size:11px">Cover / full bleed</span>
    </label>
    <div class="dim-row" style="margin-top:10px;margin-bottom:0">
      <label>fit</label>
      <select id="fit-axis">
        <option value="inside">inside</option>
        <option value="height">match height</option>
        <option value="width">match width</option>
      </select>
    </div>
    <div id="neutralize-header" style="margin-top:12px">
      <span class="section-label" style="margin:0">Paper neutralize</span>
      <span id="neutralize-val">none</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <button id="neutralize-clear" style="font-family:inherit;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;background:none;border:1px solid #000;padding:2px 6px;cursor:pointer">Clear</button>
      <input type="color" id="neutralize-color" value="#ffffff">
    </div>
    <div id="selection-header" style="margin-top:12px">
      <span class="section-label" style="margin:0">Selection</span>
    </div>
    <div class="dim-row" style="align-items:center">
      <label>sat low</label>
      <input type="range" id="selection-sat-low" min="0" max="100" step="any" value="0">
      <input type="number" id="selection-sat-low-num" class="value-input" min="0" max="100" step="0.1" value="0">
    </div>
    <div class="dim-row" style="align-items:center">
      <label>sat high</label>
      <input type="range" id="selection-sat-high" min="0" max="100" step="any" value="100">
      <input type="number" id="selection-sat-high-num" class="value-input" min="0" max="100" step="0.1" value="100">
    </div>
    <div class="dim-row" style="align-items:center">
      <label>hue low</label>
      <input type="range" id="selection-hue-low" min="0" max="360" step="any" value="0">
      <input type="number" id="selection-hue-low-num" class="value-input" min="0" max="360" step="0.1" value="0">
    </div>
    <div class="dim-row" style="align-items:center">
      <label>hue high</label>
      <input type="range" id="selection-hue-high" min="0" max="360" step="any" value="360">
      <input type="number" id="selection-hue-high-num" class="value-input" min="0" max="360" step="0.1" value="360">
    </div>
    <label class="content-toggle" style="margin-top:12px;padding-top:0">
      <input type="checkbox" id="bw-enabled">
      <span style="font-size:11px">Black &amp; white</span>
    </label>
    <div id="levels-header" style="margin-top:12px">
      <span class="section-label" style="margin:0">Levels</span>
    </div>
    <div class="dim-row" style="align-items:center">
      <label>black</label>
      <input type="range" id="levels-black" min="0" max="254" step="1" value="0">
      <span class="unit" id="levels-black-val">0</span>
    </div>
    <div class="dim-row" style="align-items:center">
      <label>gray</label>
      <input type="range" id="levels-gray" min="1" max="254" step="1" value="128">
      <span class="unit" id="levels-gray-val">128</span>
    </div>
    <div class="dim-row" style="align-items:center;margin-bottom:0">
      <label>white</label>
      <input type="range" id="levels-white" min="1" max="255" step="1" value="255">
      <span class="unit" id="levels-white-val">255</span>
    </div>
    <div id="trim-header" style="margin-top:12px">
      <span class="section-label" style="margin:0">Trim</span>
      <span id="selection-count" style="font-size:9px;color:#999;letter-spacing:0.05em"></span>
      <span id="trim-val"></span>
    </div>
    <input type="range" id="trim-slider" min="0" max="255" step="1" value="128">
    <div class="slider-ends"><span>none</span><span>max</span></div>
  </div>


</template>

<script type="module" src="src/main.js"></script>
</body>
</html>
